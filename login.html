<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Agrikura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo"><img class="logo-img" src="/assets/agrikura-logo.svg" alt="Agrikura"><span class="logo-text">Agrikura</span><span class="dot">.</span></a>
        <ul class="nav-links">
            <li><a href="/">Accueil</a></li>
            <li><a href="/marketplace.html">Marketplace</a></li>
            <li><a href="/register.html" class="btn-connect">Créer un Compte</a></li>
        </ul>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Connexion</h1>
                <p>Accédez à votre espace investisseur</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>

                <div class="form-group" id="twofa-group" style="display: none;">
                    <label for="twofa-code">Code d'authentification à deux facteurs</label>
                    <input type="text" id="twofa-code" placeholder="123456" pattern="[0-9]{6}" maxlength="6">
                    <small style="color: var(--text-secondary); font-size: 0.85rem;">Entrez le code de 6 chiffres de votre application d'authentification</small>
                </div>

                <button type="submit" class="btn-primary auth-btn" id="btn-login">
                    Se Connecter
                </button>

                <div id="auth-message" class="auth-message"></div>
            </form>

            <div class="auth-footer">
                <p>Pas encore de compte ? <a href="/register.html">Créer un compte</a></p>
            </div>
        </div>
    </main>

    <script type="module">
        import { connexionAvec2FA, getUser, logConnexionAttempt } from './auth.js';

        (async () => {
            // Si déjà connecté, rediriger
            const user = await getUser();
            if (user) {
                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/dashboard.html';
                window.location.href = redirect;
            }

            const form = document.getElementById('login-form');
            const msg = document.getElementById('auth-message');
            const btn = document.getElementById('btn-login');
            const twofaGroup = document.getElementById('twofa-group');
            const twofaInput = document.getElementById('twofa-code');

            let is2FARequired = false;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                btn.disabled = true;
                btn.textContent = 'Connexion...';
                msg.textContent = '';
                msg.className = 'auth-message';

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const twofaCode = is2FARequired ? twofaInput.value : null;

                try {
                    await connexionAvec2FA(email, password, twofaCode);

                    // Log successful login
                    await logConnexionAttempt(email, true);

                    msg.textContent = '✅ Connexion réussie ! Redirection...';
                    msg.classList.add('success');

                    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/dashboard.html';
                    setTimeout(() => window.location.href = redirect, 1000);

                } catch (err) {
                    // Log failed login attempt
                    await logConnexionAttempt(email, false);

                    if (err.message === '2FA_REQUIRED') {
                        // Show 2FA input
                        is2FARequired = true;
                        twofaGroup.style.display = 'block';
                        twofaInput.required = true;
                        twofaInput.focus();
                        msg.textContent = '🔐 Code 2FA requis. Vérifiez votre application d\'authentification.';
                        msg.classList.add('info');
                        btn.disabled = false;
                        btn.textContent = 'Vérifier le Code 2FA';
                    } else {
                        const errorMsg = err.message === 'Invalid login credentials'
                            ? 'Email ou mot de passe incorrect.'
                            : err.message === 'Code 2FA invalide'
                            ? 'Code 2FA incorrect. Réessayez.'
                            : err.message;

                        msg.textContent = '❌ ' + errorMsg;
                        msg.classList.add('error');
                        btn.disabled = false;
                        btn.textContent = 'Se Connecter';

                        // Reset 2FA if error
                        if (is2FARequired) {
                            is2FARequired = false;
                            twofaGroup.style.display = 'none';
                            twofaInput.required = false;
                            twofaInput.value = '';
                        }
                    }
                }
            });
        })();
    </script>
</body>
</html>
