    <script type="module">
        import { inscription, getUser } from './auth.js';

        const form = document.getElementById('register-form');

        const btn = document.getElementById('btn-register');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;
            if (password !== confirm) {
                msg.textContent = 'âŒ Les mots de passe ne correspondent pas.';
                msg.classList.add('error');
                return;
            }
            btn.disabled = true;
            btn.textContent = 'CrÃ©ation...';
            msg.textContent = '';
            msg.className = 'auth-message';
            try {
                await inscription(
                    document.getElementById('email').value,
                    password,
                    document.getElementById('nom').value,
                    document.getElementById('telephone').value,
                    document.getElementById('ville').value
                );
                msg.innerHTML = 'âœ… Compte crÃ©Ã© ! VÃ©rifiez votre email pour confirmer votre inscription.';
